name: release

env:
  REGISTRY: ghcr.io
  ORGANIZATION: onuminc
  IMAGE_NAME: runatlantis-docker

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/runatlantis-docker.yml"
      - "**.md"

concurrency: release-in-progress

jobs:
  build_and_create_release:
    permissions:
      contents: write
      packages: write

    runs-on: [ubuntu-latest]
    steps:
      - name: Login to gh
        run: git config --global url.https://${{ env.ORGANIZATION }}:${{ secrets.ACTION_CLONE_TOKEN }}@github.com/.insteadOf https://github.com/

      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@fcfbdceb3093f6d85a3b194740f8c6cec632f4e2 # v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"

      - name: Create Release
        id: create_release
        uses: nickatnight/releases-action@981f18b8c580e2919ca4a7ad225b2e3d5005cc1f # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: "main"
          tag: ${{ steps.tag_version.outputs.new_tag }}

      - name: Login to GHCR
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ORGANIZATION }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install QEMU
        uses: docker/setup-qemu-action@27d0a4f181a40b142cce983c5393082c365d1480 # v1

      - name: Install Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@f211e3e9ded2d9377c8cadc4489a4e38014bc4c9 # v1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@57396166ad8aefe6098280995947635806a0e6ea # v4.1.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}
          tags: |
            ${{ steps.tag_version.outputs.new_version }}
            latest

      - name: Push to GitHub Packages
        uses: docker/build-push-action@c56af957549030174b10d6867f20e78cfd7debc5 # v3.2.0
        with:
          file: ./Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"

    outputs:
      release_version: ${{ steps.tag_version.outputs.new_version }}
