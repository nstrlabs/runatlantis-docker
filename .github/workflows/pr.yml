# Trigger on changes to PRs
name: pr

env:
  REGISTRY: ghcr.io
  ORGANIZATION: onuminc
  IMAGE_NAME: runatlantis-docker

on:
  pull_request:

jobs:
  pr_build_and_publish:
    permissions:
      packages: write

    runs-on: [ubuntu-latest]
    if: github.event.pull_request.draft == false
    steps:
      - name: Login to gh
        run: git config --global url.https://${{ env.ORGANIZATION }}:${{ secrets.ACTION_CLONE_TOKEN }}@github.com/.insteadOf https://github.com/

      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Login to GHCR
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ORGANIZATION }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install QEMU
        uses: docker/setup-qemu-action@27d0a4f181a40b142cce983c5393082c365d1480 # v1

      - name: Install Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@f211e3e9ded2d9377c8cadc4489a4e38014bc4c9 # v1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c4ee3adeed93b1fa6a762f209fb01608c1a22f1e # v4.4.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}
          tags: |
            "0.0.${{ github.event.number }}-${{ github.head_ref }}"

      - name: Push to GitHub Packages
        uses: docker/build-push-action@c56af957549030174b10d6867f20e78cfd7debc5 # v3.2.0
        with:
          file: ./Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
